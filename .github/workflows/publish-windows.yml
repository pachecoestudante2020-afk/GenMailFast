name: Publish Windows
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet publish src/GenMailFast/GenMailFast.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./artifacts/GenMailFast-win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: GenMailFast-win-x64
          path: ./artifacts/GenMailFast-win-x64
